<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animated Progress Circle</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="color-scheme" content="dark light">
</head>
<body>
  <main id="main" tabindex="-1">
    <section class="card">
      <h1>Progress</h1>
      <div class="circle-container">
        <svg width="160" height="160" viewBox="0 0 100 100" aria-label="Progress circle">
          <circle cx="50" cy="50" r="42" stroke="#20304d" stroke-width="10" fill="none"/>
          <circle id="arc" cx="50" cy="50" r="42" stroke="url(#g)" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="264"/>
          <defs>
            <linearGradient id="g" x1="0" x2="1">
              <stop offset="0%" stop-color="#7dd3fc"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <text id="pct" x="50" y="54" text-anchor="middle" fill="currentColor" font-size="16" font-weight="800">0%</text>
        </svg>
      </div>
      <input id="range" type="range" min="0" max="100" value="65">
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
