<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <h1 class="title">Sticky Notes</h1>
      <div class="actions">
        <button id="addNote" class="btn">Add Note</button>
        <button id="resetNotes" class="btn">Reset</button>
        <button id="themeToggle" class="btn">Light</button>
      </div>
    </header>
    <main class="board" id="board" aria-label="Sticky notes board"></main>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
