<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Countdown Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="countdown-container">
    <h1>Countdown to New Year (2027)</h1>
    <div class="countdown">
      <div class="time-box">
        <span id="days" class="digit">00</span>
        <span class="label">Days</span>
      </div>
      <div class="time-box">
        <span id="hours" class="digit">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="time-box">
        <span id="minutes" class="digit">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="time-box">
        <span id="seconds" class="digit">00</span>
        <span class="label">Seconds</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
