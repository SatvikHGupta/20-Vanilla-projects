<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax Landing Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <ul>
    <li><a href="#hero">First</a></li>
    <li><a href="#mid">Middle</a></li>
    <li><a href="#end">Last</a></li>
  </ul>
  <button class="theme-toggle" id="theme-toggle">☀️</button>
</nav>

<section class="parallax hero" id="hero">
  <div class="overlay">
    <h1>Welcome</h1>
    <p>Scroll Down</p>
  </div>
</section>

<section class="parallax mid" id="mid">
  <div class="overlay">
    <h2>Experience the Depth</h2>
    <p>Parallax effects bring life to simple designs</p>
  </div>
</section>

<section class="parallax end" id="end">
  <div class="overlay">
    <h2>Get Started</h2>
    <p>Enjoy smooth scrolling and modern UI</p>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
